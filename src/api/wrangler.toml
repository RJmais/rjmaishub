name = "rjmaishub-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Production routes (configurar DNS de api.rjmais.com → CF)
# routes = [
#   { pattern = "api.rjmais.com/*", zone_name = "rjmais.com" }
# ]

[vars]
ENVIRONMENT = "development"
APP_URL = "https://app.rjmais.com"
SUPABASE_URL = "https://gkfodtylflcpsqzshrbu.supabase.co"

# KV — sessões cache, rate limit, feature flags
[[kv_namespaces]]
binding = "SESSIONS"
id = "ba1c57155b9947ea99253bf9e2271618"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "274f6aecd54d4bbbafc9e7708e7f2ea4"

# R2 — uploads de documentos (extratos, contratos, comprovantes)
# [[r2_buckets]]
# binding = "FILES"
# bucket_name = "rjmaishub-files"

[observability]
enabled = true

[triggers]
crons = ["0 6 * * *"]   # 06:00 UTC = 03:00 GMT-3 — sweep de retenção LGPD diário

# Secrets (configurar via `wrangler secret put NAME`):
# - DATABASE_URL            (Supabase transaction pooler connection string)
# - SUPABASE_SERVICE_ROLE_KEY
# - SUPABASE_ANON_KEY
# - ANTHROPIC_API_KEY
# - TURNSTILE_SECRET
# - RESEND_API_KEY
# - HUBSPOT_TOKEN
# - WEBHOOK_SECRET           (HMAC compartilhado com chatbots Ana/Sofia — H1; assinam com X-RJ-Signature: sha256=<hex>)
# - TOTP_ENC_KEY             (AES-256 base64 de 32 bytes p/ criptografar segredo TOTP em repouso — H2; gerar: openssl rand -base64 32)
