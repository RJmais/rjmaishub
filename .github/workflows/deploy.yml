name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Rebuild/deploy manual (ex.: Fase 3 do GO_LIVE_HUB.md — girar a site key do
  # Turnstile exige rebuildar o front; `gh variable set` sozinho não rebuilda).
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build web
        run: npm run build:web
        # Turnstile site key: é PÚBLICA e vive hardcoded como fallback nas
        # páginas de auth (Login/Signup/EsqueciSenha). Não injetar
        # VITE_TURNSTILE_SITE_KEY vazia aqui — expressão vazia vira env "" e
        # o ?? não cai no fallback (?? só pega null/undefined), quebrando o
        # widget silenciosamente.

      # Deploys SÓ em main (build/lint/test seguem rodando em PRs e develop).
      # develop deployava (a) preview do Pages carregando o service binding de
      # PRODUÇÃO — preview criaria contas reais e dispararia emails reais — e
      # (b) worker via "deploy --env staging" sem [env.staging] no wrangler.toml
      # (o que geraria um worker derivado órfão, como o antigo
      # "rjmaishub-api-production"). Reativar develop só quando existir um
      # ambiente de staging real (worker + banco + bindings próprios).
      - name: Deploy frontend (Cloudflare Pages)
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/web
          # wrangler-action (não a pages-action@v1, legada) pra garantir que
          # functions/ + wrangler.toml deste projeto (service binding API,
          # pages_build_output_dir) sejam respeitados no deploy direct-upload.
          command: pages deploy dist --project-name rjmaishub --branch main

      - name: Deploy worker
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/api
          # main deploys the REAL worker "rjmaishub-api" (top-level config; the one
          # with secrets and traffic). "--env production" was creating a parallel
          # "rjmaishub-api-production" worker with no secrets and no traffic.
          command: deploy
